<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cricza - Premium Cricket Turf Booking{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <meta name="description" content="Book premium cricket turfs easily with Cricza. Find the best venues, check availability, and play your game!">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="brand-logo">
                <img src="{{ url_for('static', filename='image/logo.png') }}" alt="Cricza Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/booking">Booking</a></li>
                <li><a href="/partner">Be our partner</a></li>
                <li><a href="/contact">Contact</a></li>
                <li><a href="/policies">Policies</a></li>
            </ul>
            <div class="nav-auth">
                <a href="/login" class="btn btn-primary">Login</a>
                <a href="/register" class="btn btn-primary">Register</a>
            </div>
            <!-- Mobile Menu Toggle -->
            <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Cricza. All rights reserved.</p>
    </footer>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
